 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | CH. Yaswanth Kumar</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .developer-badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary-color);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-control {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        input, select {
            padding: 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #f9fafb;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        /* Gender Radio Styles */
        .gender-container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .gender-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .gender-option input {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        /* Validation UI states */
        .form-control.error input,
        .form-control.error select {
            border-color: var(--error-color);
            background-color: #fef2f2;
        }

        .form-control.success input,
        .form-control.success select {
            border-color: var(--success-color);
            background-color: #f0fdf4;
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 4px;
            font-weight: 500;
            min-height: 18px;
        }

        /* Submit Button */
        button[type="submit"] {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: #4338ca;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Success Overlay Alert */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-card h2 { color: var(--success-color); margin-bottom: 10px; }
        .success-card p { color: var(--text-muted); margin-bottom: 20px; }
        .success-card button {
            background: var(--success-color);
            color: white;
            border: none; padding: 10px 24px;
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }

        /* Responsive Breakpoint */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .container { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Student Registration</h1>
            <div class="developer-badge">Developer: CH. YASWANTH KUMAR | B.Tech IT</div>
        </header>

        <form id="registrationForm" novalidate>
            <div class="form-grid">
                
                <!-- Full Name -->
                <div class="form-control full-width">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name">
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Roll Number -->
                <div class="form-control">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" placeholder="e.g., 24IT01">
                    <div class="error-message" id="rollError"></div>
                </div>

                <!-- Email ID -->
                <div class="form-control">
                    <label for="email">Email ID</label>
                    <input type="email" id="email" placeholder="name@example.com">
                    <div class="error-message" id="emailError"></div>
                </div>

                <!-- Mobile Number -->
                <div class="form-control">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="10-digit number">
                    <div class="error-message" id="mobileError"></div>
                </div>

                <!-- Date of Birth -->
                <div class="form-control">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                    <div class="error-message" id="dobError"></div>
                </div>

                <!-- Department -->
                <div class="form-control">
                    <label for="department">Department</label>
                    <select id="department">
                        <option value="">-- Select Department --</option>
                        <option value="IT">Information Technology (IT)</option>
                        <option value="CSE">Computer Science & Engineering</option>
                        <option value="ECE">Electronics & Communication</option>
                        <option value="EEE">Electrical & Electronics</option>
                    </select>
                    <div class="error-message" id="deptError"></div>
                </div>

                <!-- Gender -->
                <div class="form-control">
                    <label>Gender</label>
                    <div class="gender-container">
                        <label class="gender-option">
                            <input type="radio" name="gender" value="Male"> Male
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="Female"> Female
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="Other"> Other
                        </label>
                    </div>
                    <div class="error-message" id="genderError"></div>
                </div>

                <!-- Password -->
                <div class="form-control">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters">
                    <div class="error-message" id="passError"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-control">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password">
                    <div class="error-message" id="confirmPassError"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="full-width">Register Student</button>

            </div>
        </form>
    </div>

    <!-- Success Modal Popup -->
    <div class="success-overlay" id="successModal">
        <div class="success-card">
            <h2>Registration Successful!</h2>
            <p>Your data has been clean-validated successfully.</p>
            <button onclick="closeModal()">Great!</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop form from auto-submitting
            
            if (validateForm()) {
                document.getElementById('successModal').style.display = 'flex';
            }
        });

        function setError(inputElement, errorElementId, errorMessage) {
            const parent = inputElement.closest('.form-control');
            parent.classList.add('error');
            parent.classList.remove('success');
            document.getElementById(errorElementId).innerText = errorMessage;
        }

        function setSuccess(inputElement, errorElementId) {
            const parent = inputElement.closest('.form-control');
            parent.classList.add('success');
            parent.classList.remove('error');
            document.getElementById(errorElementId).innerText = '';
        }

        function validateForm() {
            let isValid = true;

            // 1. Full Name Validation
            const fullName = document.getElementById('fullName');
            if (fullName.value.trim() === '') {
                setError(fullName, 'nameError', 'Full name is required.');
                isValid = false;
            } else {
                setSuccess(fullName, 'nameError');
            }

            // 2. Roll Number Validation (Alphanumeric only)
            const rollNumber = document.getElementById('rollNumber');
            const rollRegex = /^[a-zA-Z0-9]+$/;
            if (rollNumber.value.trim() === '') {
                setError(rollNumber, 'rollError', 'Roll number is required.');
                isValid = false;
            } else if (!rollRegex.test(rollNumber.value)) {
                setError(rollNumber, 'rollError', 'Roll number must contain only letters and numbers.');
                isValid = false;
            } else {
                setSuccess(rollNumber, 'rollError');
            }

            // 3. Email Validation
            const email = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                setError(email, 'emailError', 'Please enter a valid email address.');
                isValid = false;
            } else {
                setSuccess(email, 'emailError');
            }

            // 4. Mobile Number Validation (Exactly 10 digits)
            const mobile = document.getElementById('mobile');
            const mobileRegex = /^\d{10}$/;
            if (!mobileRegex.test(mobile.value)) {
                setError(mobile, 'mobileError', 'Mobile number must be exactly 10 digits.');
                isValid = false;
            } else {
                setSuccess(mobile, 'mobileError');
            }

            // 5. Date of Birth Validation
            const dob = document.getElementById('dob');
            if (dob.value === '') {
                setError(dob, 'dobError', 'Please select your date of birth.');
                isValid = false;
            } else {
                setSuccess(dob, 'dobError');
            }

            // 6. Department Validation
            const department = document.getElementById('department');
            if (department.value === '') {
                setError(department, 'deptError', 'Please select your department.');
                isValid = false;
            } else {
                setSuccess(department, 'deptError');
            }

            // 7. Gender Validation
            const genders = document.getElementsByName('gender');
            let genderSelected = false;
            for (const radio of genders) {
                if (radio.checked) {
                    genderSelected = true;
                    break;
                }
            }
            // Passing the container check since radio button structures differ slightly
            const genderContainer = document.querySelector('.gender-container');
            if (!genderSelected) {
                setError(genderContainer, 'genderError', 'Please select your gender.');
                isValid = false;
            } else {
                setSuccess(genderContainer, 'genderError');
            }

            // 8. Password Validation (At least 8 chars)
            const password = document.getElementById('password');
            if (password.value.length < 8) {
                setError(password, 'passError', 'Password must be at least 8 characters long.');
                isValid = false;
            } else {
                setSuccess(password, 'passError');
            }

            // 9. Confirm Password Validation
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value === '') {
                setError(confirmPassword, 'confirmPassError', 'Please confirm your password.');
                isValid = false;
            } else if (password.value !== confirmPassword.value) {
                setError(confirmPassword, 'confirmPassError', 'Passwords do not match.');
                isValid = false;
            } else {
                setSuccess(confirmPassword, 'confirmPassError');
            }

            return isValid;
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            form.reset();
            // Clear all success UI borders
            document.querySelectorAll('.form-control').forEach(control => {
                control.classList.remove('success');
            });
        }
    </script>
</body>
</html>
